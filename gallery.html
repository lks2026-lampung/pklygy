<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — PKL Journal</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    .gallery-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all .3s;
      background: var(--bg2);
    }
    .gallery-item:hover { transform: scale(1.03); box-shadow: 0 8px 24px rgba(233,30,140,.2); border-color: var(--red2); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-item .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,.75) 100%);
      opacity: 0; transition: opacity .2s;
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 8px;
    }
    .gallery-item:hover .overlay { opacity: 1; }
    .overlay .g-name  { font-size: 11px; color: #fff; font-weight: 600; }
    .overlay .g-date  { font-size: 9px; color: rgba(255,255,255,.7); }
    .g-del {
      position: absolute; top: 6px; right: 6px;
      background: rgba(204,0,0,.85); border: none;
      border-radius: 4px; color: #fff;
      font-size: 11px; padding: 3px 7px; cursor: pointer;
    }

    .upload-zone {
      border: 2px dashed var(--border2);
      border-radius: var(--radius-lg);
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      background: var(--bg2);
      margin-bottom: 16px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--red2);
      background: rgba(233,30,140,.05);
    }
    .upload-zone .upload-icon { font-size: 34px; margin-bottom: 8px; }
    .upload-zone p { font-size: 13px; color: var(--text-2); margin-bottom: 3px; }
    .upload-zone small { font-size: 10px; color: var(--text-3); }

    .upload-progress-wrap { display:none; margin-top: 12px; }

    /* Lightbox */
    #lightbox {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.93);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    #lightbox.show { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 82vh; object-fit: contain; border-radius: 8px; }
    .lb-close {
      position: absolute; top: 16px; right: 20px;
      font-size: 28px; color: #fff; cursor: pointer;
      background: none; border: none; line-height: 1;
    }
    .lb-info {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%); text-align: center; color: #fff;
    }
    .lb-name    { font-size: 14px; font-weight: 600; }
    .lb-caption { font-size: 12px; opacity: .7; margin-top: 3px; }
  </style>
</head>
<body>
<div class="page-wrapper">
  <div id="sidebar-mount"></div>
  <main class="main">

    <div class="page-header">
      <h1>📸 Gallery PKL</h1>
      <div class="sub">Kenangan selama PKL di Sentra Computer ✨</div>
    </div>

    <!-- UPLOAD ZONE -->
    <div class="upload-zone" id="upload-zone"
         onclick="document.getElementById('file-input').click()"
         ondragover="onDragOver(event)"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event)">
      <div class="upload-icon">📷</div>
      <p>Tap atau drag foto ke sini</p>
      <small>JPG, PNG, WEBP · Maks 5MB per foto</small>
      <div class="upload-progress-wrap" id="upload-progress-wrap">
        <div class="progress-track" style="height:8px;">
          <div class="progress-bar" id="upload-bar" style="width:0%;"></div>
        </div>
        <div style="font-size:11px;color:var(--text-3);margin-top:5px;" id="upload-status">Uploading...</div>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none;" onchange="handleFileSelect(event)">

    <!-- CAPTION FORM -->
    <div class="form-card" id="caption-form" style="display:none;margin-bottom:16px;">
      <div class="form-title" style="font-size:18px;">✏️ Keterangan Foto</div>
      <div class="form-group" style="margin-bottom:14px;">
        <label>Caption (opsional)</label>
        <input type="text" id="caption-input" placeholder="Contoh: Hari pertama PKL di Sentra Computer..." maxlength="100">
      </div>
      <div id="preview-wrap" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="uploadPending()">📤 Upload</button>
        <button class="btn btn-secondary" onclick="cancelUpload()">Batal</button>
      </div>
    </div>

    <!-- FILTER & COUNT -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
      <select class="filter-select" id="filter-user" onchange="loadGallery()">
        <option value="">Semua</option>
        <option value="user_shandy">Shandy</option>
        <option value="user_sabrina">Sabrina</option>
        <option value="user_fahri">Fahri</option>
      </select>
      <span style="font-size:11px;color:var(--text-3);" id="photo-count">0 foto</span>
    </div>

    <!-- GALLERY -->
    <div id="gallery-grid" class="gallery-grid">
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="empty-icon">📷</div>Belum ada foto.
      </div>
    </div>

  </main>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="">
  <div class="lb-info">
    <div class="lb-name" id="lb-name"></div>
    <div class="lb-caption" id="lb-caption"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/telegram.js"></script>
<script src="js/autodown.js"></script>
<script>
// ── Cloudinary config ─────────────────────────────────────
const CLOUD_NAME    = "duatrj8p3";
const UPLOAD_PRESET = "sentra";
const UPLOAD_URL    = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

const user = requireSession();
initPage("gallery");

let pendingFiles = [];

// ── Drag & drop ───────────────────────────────────────────
function onDragOver(e)  { e.preventDefault(); document.getElementById("upload-zone").classList.add("dragover"); }
function onDragLeave(e) { document.getElementById("upload-zone").classList.remove("dragover"); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById("upload-zone").classList.remove("dragover");
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith("image/"));
  if (files.length) prepareUpload(files);
}

function handleFileSelect(e) {
  const files = Array.from(e.target.files).filter(f => f.type.startsWith("image/"));
  if (files.length) prepareUpload(files);
  e.target.value = "";
}

function prepareUpload(files) {
  const oversized = files.filter(f => f.size > 5 * 1024 * 1024);
  if (oversized.length) { showToast("Ada foto melebihi 5MB!", "error"); return; }
  pendingFiles = files;

  // Preview
  const wrap = document.getElementById("preview-wrap");
  wrap.innerHTML = "";
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement("img");
      img.src = e.target.result;
      img.style.cssText = "width:70px;height:70px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border);";
      wrap.appendChild(img);
    };
    reader.readAsDataURL(f);
  });

  document.getElementById("caption-form").style.display = "block";
  document.getElementById("caption-input").value = "";
  document.getElementById("caption-input").focus();
}

function cancelUpload() {
  pendingFiles = [];
  document.getElementById("caption-form").style.display = "none";
  document.getElementById("preview-wrap").innerHTML = "";
}

// ── Upload ke Cloudinary ──────────────────────────────────
async function uploadPending() {
  if (!pendingFiles.length) return;
  const caption   = document.getElementById("caption-input").value.trim();
  const progWrap  = document.getElementById("upload-progress-wrap");
  const bar       = document.getElementById("upload-bar");
  const status    = document.getElementById("upload-status");

  document.getElementById("caption-form").style.display = "none";
  document.getElementById("upload-zone").querySelector("p").textContent = "Mengupload...";
  progWrap.style.display = "block";

  let uploaded = 0;
  for (const file of pendingFiles) {
    status.textContent = `Uploading ${uploaded+1}/${pendingFiles.length}...`;
    bar.style.width    = Math.round((uploaded / pendingFiles.length) * 100) + "%";

    try {
      const formData = new FormData();
      formData.append("file",           file);
      formData.append("upload_preset",  UPLOAD_PRESET);
      formData.append("folder",         "pkl_sentra");

      const res  = await fetch(UPLOAD_URL, { method: "POST", body: formData });
      const data = await res.json();

      if (data.secure_url) {
        // Simpan metadata ke Firebase
        await galleryRef().push({
          url:        data.secure_url,
          publicId:   data.public_id,
          caption,
          userName:   user.display,
          uid:        user.uid,
          uploadedAt: Date.now(),
          tanggal:    new Date().toISOString().slice(0,10),
          width:      data.width,
          height:     data.height
        });
        uploaded++;
      } else {
        showToast("Upload gagal: " + (data.error?.message || "Unknown error"), "error");
      }
    } catch(e) {
      showToast("Upload error: " + e.message, "error");
    }
  }

  bar.style.width = "100%";
  status.textContent = "Selesai!";
  setTimeout(() => {
    progWrap.style.display = "none";
    bar.style.width = "0%";
    document.getElementById("upload-zone").querySelector("p").textContent = "Tap atau drag foto ke sini";
  }, 1000);

  if (uploaded > 0) {
    showToast(`${uploaded} foto berhasil diupload! 📸`, "success");
    loadGallery();
  }
  pendingFiles = [];
}

// ── Load gallery ──────────────────────────────────────────
function loadGallery() {
  const filterUid = document.getElementById("filter-user").value;
  galleryRef().orderByChild("uploadedAt").once("value", snap => {
    const items = [];
    snap.forEach(c => {
      const d = c.val();
      if (!filterUid || d.uid === filterUid) items.unshift({ key: c.key, ...d });
    });

    document.getElementById("photo-count").textContent = items.length + " foto";
    const grid = document.getElementById("gallery-grid");

    if (!items.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📷</div>Belum ada foto. Upload sekarang!</div>`;
      return;
    }

    grid.innerHTML = items.map(item => `
      <div class="gallery-item" onclick="openLightbox('${item.url}','${esc(item.userName)}','${esc(item.caption||"")}')">
        <img src="${item.url}" alt="${esc(item.caption||"")}" loading="lazy">
        <div class="overlay">
          ${user.uid === item.uid ? `<button class="g-del" onclick="deletePhoto(event,'${item.key}','${esc(item.publicId||"")}')">🗑</button>` : ""}
          <div class="g-name">${item.userName||""}</div>
          <div class="g-date">${item.tanggal||""} ${item.caption ? "· "+item.caption : ""}</div>
        </div>
      </div>`).join("");
  });
}
loadGallery();

// ── Lightbox ──────────────────────────────────────────────
function openLightbox(url, name, caption) {
  document.getElementById("lb-img").src              = url;
  document.getElementById("lb-name").textContent     = name;
  document.getElementById("lb-caption").textContent  = caption;
  document.getElementById("lightbox").classList.add("show");
}

function closeLightbox(e) {
  if (!e || e.target.id === "lightbox" || e.target.classList.contains("lb-close")) {
    document.getElementById("lightbox").classList.remove("show");
    document.getElementById("lb-img").src = "";
  }
}

// ── Delete ────────────────────────────────────────────────
async function deletePhoto(e, key, publicId) {
  e.stopPropagation();
  if (!confirm("Hapus foto ini?")) return;
  try {
    await galleryRef().child(key).remove();
    showToast("Foto dihapus ✔", "success");
    loadGallery();
    // Note: delete dari Cloudinary butuh server-side, skip untuk sekarang
  } catch(err) {
    showToast("Gagal hapus: " + err.message, "error");
  }
}

function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
</script>
</body>
</html>
